<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#D4AF37" stroke-width="4"/>
  <circle cx="100" cy="100" r="83" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>

  <!-- Suit symbols at cardinal points -->
  <text x="100" y="28" font-family="Arial" font-size="16" fill="#D4AF37" text-anchor="middle">♠</text>
  <text x="100" y="188" font-family="Arial" font-size="16" fill="#D4AF37" text-anchor="middle">♥</text>
  <text x="18" y="106" font-family="Arial" font-size="14" fill="#D4AF37" text-anchor="middle">♦</text>
  <text x="182" y="106" font-family="Arial" font-size="14" fill="#D4AF37" text-anchor="middle">♣</text>

  <!-- Center number -->
  <text x="100" y="118" font-family="Georgia,serif" font-size="68" font-weight="700" fill="#D4AF37" text-anchor="middle">21</text>

  <!-- Team label -->
  <text x="100" y="148" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle" letter-spacing="4">TEAM</text>
</svg>
