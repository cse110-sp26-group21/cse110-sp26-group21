<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#1a1a1a" rx="12"/>

  <!-- Card back -->
  <rect x="100" y="40" width="75" height="108" rx="8" fill="#C0392B" stroke="#e74c3c" stroke-width="2"/>
  <rect x="107" y="47" width="61" height="94" rx="5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Hatch pattern on back card -->
  <line x1="107" y1="141" x2="168" y2="47" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="117" y1="141" x2="168" y2="57" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="127" y1="141" x2="168" y2="67" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="137" y1="141" x2="168" y2="77" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="147" y1="141" x2="168" y2="87" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="107" y1="131" x2="157" y2="47" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="107" y1="121" x2="147" y2="47" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="107" y1="111" x2="137" y2="47" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Card front (ace of spades) -->
  <rect x="125" y="55" width="75" height="108" rx="8" fill="#ffffff" stroke="#dddddd" stroke-width="1"/>
  <!-- Top-left label -->
  <text x="133" y="73" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#1a1a1a">A</text>
  <text x="133" y="85" font-family="Arial" font-size="13" fill="#1a1a1a">♠</text>
  <!-- Center spade -->
  <text x="162" y="118" font-family="Arial" font-size="32" fill="#1a1a1a" text-anchor="middle">♠</text>
  <!-- Bottom-right label (rotated) -->
  <text x="192" y="152" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="end" transform="rotate(180,192,152)">A</text>

  <!-- Wordmark -->
  <text x="230" y="90" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="6">9+10</text>
  <text x="232" y="112" font-family="Arial,sans-serif" font-size="11" fill="#D4AF37" letter-spacing="5">CSE 110 · GROUP 21</text>

  <!-- Divider line -->
  <line x1="228" y1="122" x2="370" y2="122" stroke="#D4AF37" stroke-width="0.75" opacity="0.5"/>

  <text x="232" y="140" font-family="Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="3">ALWAYS BET ON 21</text>
</svg>
